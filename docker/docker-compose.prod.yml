name: junando
services:
  junando-webhook:
    image: ghcr.io/germoren/junando-webhook:latest
    ports:
      - '4000:4000'
    env_file: ../.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  junando-worker:
    image: ghcr.io/germoren/junando-worker:latest
    env_file: ../.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  junando-ingest:
    image: ghcr.io/germoren/junando-ingest:${TAG:-latest}
    env_file: ../.env
    environment:
      INGEST_CONFIG_PATH: /etc/junando/ingest.config.yaml
    volumes:
      - ./ingest.config.yaml:/etc/junando/ingest.config.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
