global:
  resolve_timeout: 5m
route:
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h
  receiver: junando
receivers:
  - name: junando
    webhook_configs:
      # Para local development: usar http://host.docker.internal:4000/webhook/alert
      # Para producción: configurar JUNANDO_WEBHOOK_URL en environment
      - url: '${JUNANDO_WEBHOOK_URL:-http://host.docker.internal:4000/webhook/alert}'
        send_resolved: true
