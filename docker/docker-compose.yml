name: junando
services:
  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      retries: 5

  loki:
    image: grafana/loki:3.0.0
    ports: ['3100:3100']
    volumes: ['./loki/loki-config.yml:/etc/loki/local-config.yaml']
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:3100/ready || exit 1']
      interval: 10s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.53.0
    ports: ['9090:9090']
    volumes:
      - './prometheus/prometheus.yml:/etc/prometheus/prometheus.yml'
      - './prometheus/rules:/etc/prometheus/rules:ro'

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports: ['9093:9093']
    volumes:
      - './alertmanager/alertmanager.yml.template:/etc/alertmanager/alertmanager.yml.template:ro'
      - './alertmanager/start.sh:/entrypoint.sh:ro'
    environment:
      - JUNANDO_WEBHOOK_URL=${JUNANDO_WEBHOOK_URL:-http://host.docker.internal:4000/webhook/alert}
    entrypoint: ['/bin/sh', '/entrypoint.sh']

  grafana:
    image: grafana/grafana:11.1.0
    ports: ['3000:3000']
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - './grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml'
      - './grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml'
      - '../docs/dashboards/alert-volume.json:/var/lib/grafana/dashboards/alert-volume.json'
      - '../docs/dashboards/llm-performance.json:/var/lib/grafana/dashboards/llm-performance.json'
      - '../docs/dashboards/sqs-health.json:/var/lib/grafana/dashboards/sqs-health.json'

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    ports: ['9200:9200']
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    healthcheck:
      test: ['CMD-SHELL', 'curl -fs http://localhost:9200/_cluster/health >/dev/null']
      interval: 10s
      timeout: 5s
      retries: 10
