{{/*
hpa.yaml — HorizontalPodAutoscaler for the webhook Deployment.
Only rendered when both webhook.enabled and webhook.hpa.enabled are true.
*/}}
{{- if and .Values.webhook.enabled .Values.webhook.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "junando.fullname" . }}-webhook
  labels:
    {{- include "junando.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "junando.fullname" . }}-webhook
  minReplicas: {{ .Values.webhook.hpa.minReplicas }}
  maxReplicas: {{ .Values.webhook.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.webhook.hpa.targetCPUUtilizationPercentage }}
{{- end }}
