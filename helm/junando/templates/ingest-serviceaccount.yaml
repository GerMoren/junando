{{/*
ingest-serviceaccount.yaml — ServiceAccount used by all three Deployments.
Adds IRSA annotation when serviceAccount.irsaRoleArn is non-empty.
Merges ingest.serviceAccount.annotations for GCP Workload Identity etc.
Only rendered when serviceAccount.create is true.
*/}}
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "junando.serviceAccountName" . }}
  labels:
    {{- include "junando.labels" . | nindent 4 }}
  {{- $annotations := dict }}
  {{- if .Values.serviceAccount.irsaRoleArn }}
  {{- $_ := set $annotations "eks.amazonaws.com/role-arn" .Values.serviceAccount.irsaRoleArn }}
  {{- end }}
  {{- $annotations = merge $annotations .Values.ingest.serviceAccount.annotations }}
  {{- if $annotations }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
{{- end }}
