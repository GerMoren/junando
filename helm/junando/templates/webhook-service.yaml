{{/*
webhook-service.yaml — ClusterIP Service for the webhook Deployment.
Only rendered when webhook.enabled is true.
*/}}
{{- if .Values.webhook.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "junando.fullname" . }}-webhook
  labels:
    {{- include "junando.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
spec:
  type: {{ .Values.webhook.service.type }}
  ports:
    - port: {{ .Values.webhook.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "junando.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
{{- end }}
