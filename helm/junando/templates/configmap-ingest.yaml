{{/*
configmap-ingest.yaml — ConfigMap holding the ingest YAML config file.
Mounted into the ingest Deployment at ingest.configMountPath/config.yaml.
Only rendered when ingest.enabled is true.
*/}}
{{- if .Values.ingest.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "junando.fullname" . }}-ingest-config
  labels:
    {{- include "junando.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest
data:
  config.yaml: |
    {{- .Values.ingest.config | toYaml | nindent 4 }}
{{- end }}
