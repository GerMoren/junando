{{/*
secret.yaml — Shared Opaque Secret containing all environment variables.
All Deployments reference this Secret via envFrom.secretRef.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "junando.fullname" . }}-secrets
  labels:
    {{- include "junando.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
