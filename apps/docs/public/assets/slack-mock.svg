<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" fill="none" aria-label="Junando incident notification in Slack">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1d21"/>
      <stop offset="100%" stop-color="#15171a"/>
    </linearGradient>
    <linearGradient id="urgencyHigh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Slack background -->
  <rect width="520" height="420" rx="16" fill="#0b0c0e"/>

  <!-- Message card -->
  <rect x="24" y="24" width="472" height="372" rx="12" fill="url(#cardBg)" stroke="#2a2d31" stroke-width="1" filter="url(#shadow)"/>

  <!-- App avatar -->
  <rect x="48" y="48" width="40" height="40" rx="8" fill="#3b82f6"/>
  <text x="68" y="74" fill="#fff" font-size="18" font-weight="700" text-anchor="middle" font-family="Inter, system-ui, sans-serif">J</text>

  <!-- App name and time -->
  <text x="100" y="62" fill="#fafafa" font-size="15" font-weight="700" font-family="Inter, system-ui, sans-serif">Junando</text>
  <text x="162" y="62" fill="#6b7280" font-size="12" font-family="Inter, system-ui, sans-serif">APP  ·  21:45</text>

  <!-- Incident title with urgency dot -->
  <circle cx="62" cy="116" r="8" fill="url(#urgencyHigh)"/>
  <text x="82" y="121" fill="#fafafa" font-size="16" font-weight="700" font-family="Inter, system-ui, sans-serif">Incident — checkout-api</text>

  <!-- Metadata grid -->
  <g transform="translate(48, 150)">
    <text x="0" y="0" fill="#9ca3af" font-size="12" font-weight="600" font-family="Inter, system-ui, sans-serif">Service</text>
    <text x="0" y="18" fill="#e5e7eb" font-size="13" font-family="Inter, system-ui, sans-serif">checkout-api</text>

    <text x="220" y="0" fill="#9ca3af" font-size="12" font-weight="600" font-family="Inter, system-ui, sans-serif">Alerts</text>
    <text x="220" y="18" fill="#e5e7eb" font-size="13" font-family="Inter, system-ui, sans-serif">1</text>

    <text x="0" y="50" fill="#9ca3af" font-size="12" font-weight="600" font-family="Inter, system-ui, sans-serif">Endpoint</text>
    <text x="0" y="68" fill="#e5e7eb" font-size="13" font-family="Inter, system-ui, sans-serif">/api/orders</text>

    <text x="220" y="50" fill="#9ca3af" font-size="12" font-weight="600" font-family="Inter, system-ui, sans-serif">Urgency</text>
    <circle cx="233" cy="63" r="5" fill="#f59e0b"/>
    <text x="248" y="68" fill="#e5e7eb" font-size="13" font-family="Inter, system-ui, sans-serif">HIGH</text>
  </g>

  <!-- Probable cause -->
  <g transform="translate(48, 250)">
    <text x="0" y="0" fill="#fafafa" font-size="13" font-weight="700" font-family="Inter, system-ui, sans-serif">Probable cause</text>
    <text x="0" y="22" fill="#9ca3af" font-size="13" font-family="Inter, system-ui, sans-serif">Internal server error due to unhandled exception</text>
    <text x="0" y="42" fill="#9ca3af" font-size="13" font-family="Inter, system-ui, sans-serif">or upstream service failure</text>
  </g>

  <!-- Recommended steps -->
  <g transform="translate(48, 320)">
    <text x="0" y="0" fill="#fafafa" font-size="13" font-weight="700" font-family="Inter, system-ui, sans-serif">Recommended steps</text>
    <text x="0" y="22" fill="#9ca3af" font-size="12" font-family="Inter, system-ui, sans-serif">1. Check application logs for stack traces</text>
    <text x="0" y="40" fill="#9ca3af" font-size="12" font-family="Inter, system-ui, sans-serif">2. Review recent deployments for potential issues</text>
  </g>
</svg>
