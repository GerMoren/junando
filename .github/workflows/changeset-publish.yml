name: Changeset Publish

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dist-tag:
        description: 'npm dist-tag (latest, next, beta)'
        required: false
        default: 'latest'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish packages to npm
    runs-on: ubuntu-latest
    if: "github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'chore: version packages')"
    environment: npm

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r run build

      - name: Verify package contents
        run: node scripts/verify-package-files.mjs

      - name: Publish packages
        uses: changesets/action@v1
        with:
          # OIDC-only: no NODE_AUTH_TOKEN so npm CLI falls through to Trusted
          # Publisher token exchange. Provenance is requested via the
          # NPM_CONFIG_PROVENANCE env var (npm CLI honors it as if --provenance
          # were passed). `changeset publish` does NOT accept --provenance as
          # a CLI flag. See issue #110.
          publish: pnpm changeset publish --tag ${{ inputs['dist-tag'] || 'latest' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          NPM_CONFIG_PROVENANCE: 'true'
