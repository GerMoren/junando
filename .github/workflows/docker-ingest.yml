name: Docker — ingest

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'packages/core/**'
      - 'packages/ingest/**'
      - 'scripts/ingest-server.ts'
      - 'scripts/ingest/**'
      - 'scripts/factories/**'
      - 'docker/Dockerfile.ingest'
      - 'docker/ingest.config*.yaml'
      - '.github/workflows/docker-ingest.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: germoren

jobs:
  build-ingest:
    name: Build & Push ingest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/junando-ingest
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ingest
          # NOTE: arm64 disabled — QEMU emulation crashes with SIGILL during
          # pnpm install for ingest (larger dep graph than webhook/worker).
          # Re-enable via native arm64 runners once available. See issue #33.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
