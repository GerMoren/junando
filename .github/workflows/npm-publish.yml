name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dist-tag:
        description: 'npm dist-tag (latest, next, beta)'
        required: false
        default: 'latest'

permissions:
  contents: read

jobs:
  publish:
    name: Publish all packages
    environment: npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r run build

      - name: Verify package contents
        run: node scripts/verify-package-files.mjs

      - name: Publish @junando/core
        run: pnpm publish --access public --tag "${DIST_TAG}" --no-git-checks
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DIST_TAG: ${{ inputs.dist-tag || 'latest' }}

      - name: Publish @junando/ingest
        run: pnpm publish --access public --tag "${DIST_TAG}" --no-git-checks
        working-directory: packages/ingest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DIST_TAG: ${{ inputs.dist-tag || 'latest' }}

      - name: Publish @junando/webhook
        run: pnpm publish --access public --tag "${DIST_TAG}" --no-git-checks
        working-directory: packages/webhook
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DIST_TAG: ${{ inputs.dist-tag || 'latest' }}

      - name: Publish @junando/worker
        run: pnpm publish --access public --tag "${DIST_TAG}" --no-git-checks
        working-directory: packages/worker
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DIST_TAG: ${{ inputs.dist-tag || 'latest' }}
